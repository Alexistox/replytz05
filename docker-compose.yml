# Chạy userbot trong container.
# Bắt buộc: file config.js và settings.json trên máy host (xem DOCKER.md).

services:
  # Tên service = tên dùng trong lệnh: docker compose run replytz-userbot
  replytz-userbot:
    build: .
    image: replytz-userbot:latest
    container_name: replytz-userbot
    restart: unless-stopped
    init: true
    # Bật khi cần đăng nhập lần đầu (OTP / 2FA) qua console
    stdin_open: true
    tty: true
    environment:
      TZ: Asia/Ho_Chi_Minh
      # Tùy chọn: /copyall — số tin tối đa mỗi lần (mặc định 5000 / 3000)
      COPYALL_MAX_COLLECT: "10000"
      COPYALL_MAX_COPY: "10000"
      TELEGRAM_API_ID: "13656730"
      TELEGRAM_API_HASH: "4d9d6a0e9ff0548c33417d651ca5150e"
      TELEGRAM_PHONE_NUMBER: "+8801876973955"
    volumes:
      - ./config.js:/app/config.js
      - ./settings.json:/app/settings.json
      # Session đăng nhập (tự tạo/ghi sau lần đầu). Trước khi chạy Docker lần đầu: touch telegram.session
      - ./telegram.session:/app/telegram.session
